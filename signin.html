<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js"></script>
  <title>Sign In — ClearPath FDO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --header-height: 64px;
      --brand-blue:      #5A57DE;
      --brand-blue-dark: #2E2C85;
      --brand-path:      #0d9488;
      --cta-gradient:    linear-gradient(90deg, #5064E5 0%, #5F50E5 100%);
      --bg-page:         linear-gradient(180deg, rgba(235,235,237,0.60) 0%, rgba(220,220,236,0.60) 100%), #FFF;
      --bg-header:       #F9F9FB;
      --bg-surface:      #ffffff;
      --text-primary:    #121219;
      --text-secondary:  #666689;
      --text-muted:      #9ca3af;
      --border-input:    #F0F0F7;
      --border-subtle:   #f3f4f6;
      --red:             #ef4444;
    }

    body {
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      height: var(--header-height);
      background: var(--bg-header);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .header-logo-icon {
      width: 32px;
      height: 32px;
      background: var(--brand-path);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-logo-icon svg { width: 18px; height: 18px; fill: white; }

    .header-logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
    .header-logo-text .clear { color: var(--text-primary); }
    .header-logo-text .path  { color: #5064E5; }
    .header-logo-text .fdo   { color: var(--text-secondary); font-weight: 500; margin-left: 2px; }

    /* ── PAGE ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px 64px;
    }

    /* ── CARD ── */
    .card {
      background: var(--bg-surface);
      border-radius: 8px;
      border: 1px solid var(--border-subtle);
      box-shadow: 0 4px 24px rgba(90,87,222,0.07), 0 1px 4px rgba(0,0,0,0.04);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }

    .card-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--brand-path);
      background: #F0FDFA;
      border: 1px solid #CCFBF1;
      border-radius: 99px;
      padding: 3px 10px;
      margin-bottom: 16px;
    }

    .card-header { margin-bottom: 32px; }
    .card-header h1 { font-size: 22px; font-weight: 700; color: var(--text-primary); }
    .card-header p  { margin-top: 6px; font-size: 14px; color: var(--text-secondary); }

    /* ── FORM ── */
    .form { display: flex; flex-direction: column; gap: 16px; }

    .field { display: flex; flex-direction: column; gap: 6px; }

    .field label { font-size: 13px; font-weight: 500; color: var(--text-primary); }

    .field input {
      height: 40px;
      padding: 0 12px;
      border: 1.5px solid var(--border-input);
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text-primary);
      background: var(--bg-surface);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      width: 100%;
    }

    .field input::placeholder { color: var(--text-muted); }

    .field input:focus {
      border-color: var(--brand-blue);
      box-shadow: 0 0 0 3px rgba(90,87,222,.12);
    }

    .field input.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(239,68,68,.10);
    }

    .field-error { font-size: 12px; color: var(--red); display: none; }
    .field-error.visible { display: block; }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .label-row a {
      font-size: 12px;
      color: var(--brand-blue);
      text-decoration: none;
      font-weight: 500;
    }
    .label-row a:hover { text-decoration: underline; }

    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 40px; }

    .toggle-pw {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      padding: 2px;
    }
    .toggle-pw:hover { color: var(--text-secondary); }

    /* ── ALERT ── */
    .alert-error {
      display: none;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #991b1b;
      gap: 8px;
      align-items: center;
    }
    .alert-error.visible { display: flex; }

    /* ── REMEMBER ── */
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .remember input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--brand-blue);
      cursor: pointer;
    }

    /* ── BUTTON ── */
    .btn-primary {
      height: 40px;
      background: var(--cta-gradient);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(80,100,229,.25);
      transition: opacity .15s, transform .1s, box-shadow .15s;
      width: 100%;
    }
    .btn-primary:hover  { opacity: .92; box-shadow: 0 4px 12px rgba(80,100,229,.35); }
    .btn-primary:active { transform: translateY(1px); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; transform: none; box-shadow: none; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    .btn-primary.loading .spinner  { display: block; }
    .btn-primary.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-subtle);
    }

    /* ── FOOTER LINK ── */
    .signup-link {
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .signup-link a {
      color: var(--brand-blue);
      font-weight: 600;
      text-decoration: none;
    }
    .signup-link a:hover { text-decoration: underline; }

    /* ── SECURITY BADGE ── */
    .security-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 24px;
    }
  </style>
</head>
<body>

  <header>
    <a href="#" class="header-logo">
      <div class="header-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      </div>
      <span class="header-logo-text">
        <span class="clear">Clear </span><span class="path">Path</span><span class="fdo"> FDO</span>
      </span>
    </a>
  </header>

  <main>
    <div class="card">

      <div class="card-eyebrow">
        <i class="ti ti-shield-check" style="font-size:11px;"></i>
        Front Desk Office
      </div>

      <div class="card-header">
        <h1>Welcome back</h1>
        <p>Sign in to your ClearPath FDO account to continue.</p>
      </div>

      <form class="form" id="signinForm" novalidate>

        <!-- Auth error alert -->
        <div class="alert-error" id="authError">
          <i class="ti ti-alert-circle" style="font-size:16px;flex-shrink:0;"></i>
          <span id="authErrorMsg">Invalid email or password. Please try again.</span>
        </div>

        <!-- Email -->
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@facility.org" autocomplete="email" />
          <span class="field-error" id="emailErr">
            <i class="ti ti-alert-circle" style="font-size:11px;margin-right:3px;"></i>Please enter a valid email address.
          </span>
        </div>

        <!-- Password -->
        <div class="field">
          <div class="label-row">
            <label for="password">Password</label>
            <a href="#">Forgot password?</a>
          </div>
          <div class="password-wrap">
            <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" />
            <button type="button" class="toggle-pw" aria-label="Toggle password visibility" onclick="togglePw(this)">
              <i class="ti ti-eye" style="font-size:17px;"></i>
            </button>
          </div>
          <span class="field-error" id="passwordErr">
            <i class="ti ti-alert-circle" style="font-size:11px;margin-right:3px;"></i>Password is required.
          </span>
        </div>

        <!-- Remember me -->
        <label class="remember">
          <input type="checkbox" id="remember" name="remember" />
          Keep me signed in
        </label>

        <!-- Submit -->
        <button type="submit" class="btn-primary" id="submitBtn">
          <div class="spinner"></div>
          <span class="btn-text">
            <i class="ti ti-login" style="font-size:15px;"></i>
            Sign In
          </span>
        </button>

        <div class="divider">or</div>

        <p class="signup-link">
          Don't have an account? <a href="signup.html">Create one</a>
        </p>

      </form>

      <div class="security-note">
        <i class="ti ti-lock" style="font-size:11px;"></i>
        HIPAA-compliant · Encrypted connection
      </div>

    </div>
  </main>

  <script>
    function togglePw(btn) {
      const input = document.getElementById('password');
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      const icon  = btn.querySelector('i');
      icon.className = show ? 'ti ti-eye-off' : 'ti ti-eye';
      icon.style.fontSize = '17px';
    }

    document.getElementById('signinForm').addEventListener('submit', function (e) {
      e.preventDefault();
      let valid = true;

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const emailErr = document.getElementById('emailErr');
      const passErr  = document.getElementById('passwordErr');
      const authErr  = document.getElementById('authError');

      authErr.classList.remove('visible');

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('email').classList.add('error');
        emailErr.classList.add('visible');
        valid = false;
      } else {
        document.getElementById('email').classList.remove('error');
        emailErr.classList.remove('visible');
      }

      if (!password) {
        document.getElementById('password').classList.add('error');
        passErr.classList.add('visible');
        valid = false;
      } else {
        document.getElementById('password').classList.remove('error');
        passErr.classList.remove('visible');
      }

      if (!valid) return;

      const btn = document.getElementById('submitBtn');
      btn.classList.add('loading');
      btn.disabled = true;

      setTimeout(() => {
        btn.classList.remove('loading');
        btn.disabled = false;
        if (email === 'admin@clearpath.com' && password === 'admin@123') {
          window.location.href = 'appointments.html';
        } else {
          authErr.classList.add('visible');
        }
      }, 1400);
    });

    document.querySelectorAll('input').forEach(el => {
      el.addEventListener('input', function () {
        this.classList.remove('error');
        const err = document.getElementById(this.id + 'Err');
        if (err) err.classList.remove('visible');
        document.getElementById('authError').classList.remove('visible');
      });
    });
  </script>
</body>
</html>
